name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to create GitHub Releases and upload assets

jobs:
  release:
    runs-on: macos-14  # Apple Silicon — builds arm64 natively

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Create a fresh temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the Developer ID certificate + private key
          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Make the keychain searchable and allow codesign without prompts
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          KEY_PATH=~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          echo -n "$APPLE_API_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build, sign, notarize, and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FLEET_NOTARIZE: '1'
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          # Tell electron-builder to use our temp keychain
          CSC_KEYCHAIN: ${{ runner.temp }}/app-signing.keychain-db
        run: npm run release

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/cert.p12"
