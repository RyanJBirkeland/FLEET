name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep
      - run: npm run lint
      - run: npm run typecheck
      # Phase A correctness audit: mechanical grep gate for the invariants in
      # openspec/changes/pipeline-stop-the-bleeding. Currently advisory — does
      # not block merge until the constituent ep* changes have landed.
      - name: Phase A correctness audit (advisory)
        run: npm run audit:phase-a || echo "::warning::Phase A invariants not yet satisfied"

      # Heavy test suites run on PRs only. Pushes to `main` are already verified
      # locally by the pre-push hook (`npm run typecheck && npm test && npm run
      # test:main`), so CI's role on push is a lightweight safety net for the
      # bypassed-hook case. This cuts per-push CI time from ~5min to ~90s and
      # keeps GitHub Actions minutes under the Pro tier's 3000/month budget.
      #
      # Job name stays `check` so the existing branch protection rule is unaffected.
      - name: Renderer tests with coverage (PR only)
        if: github.event_name == 'pull_request'
        run: npm run test:coverage
      - name: Main process tests (PR only)
        if: github.event_name == 'pull_request'
        run: npm run test:main
