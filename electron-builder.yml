appId: com.rbtechbot.bde
productName: BDE
directories:
  buildResources: resources
  output: release
files:
  - out/**/*
  - "!out/**/*.map"
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: arm64
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  icon: resources/icon.icns
dmg:
  title: "BDE ${version}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
