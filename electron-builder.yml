appId: com.rbtechbot.fleet
productName: FLEET
copyright: Copyright © 2026 FLEET
npmRebuild: true
afterSign: scripts/after-sign.cjs
directories:
  buildResources: resources
  output: release
files:
  - out/**/*
  - '!out/**/*.map'
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: arm64
  identity: "Ryan Birkeland (DWK5AJJ5WY)"
  hardenedRuntime: true
  gatekeeperAssess: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  icon: resources/icon.icns
dmg:
  sign: true
  title: 'FLEET ${version}'
  contents:
    - x: 130
      y: 220
      name: FLEET.app
    - x: 410
      y: 220
      type: link
      path: /Applications
      name: Applications
  window:
    width: 540
    height: 380

publish:
  provider: github
  owner: RyanJBirkeland
  repo: FLEET
